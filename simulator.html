<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive TwinKey ARAS dual-MCU rider safety simulator.">
  <meta name="theme-color" content="#071019">
  <title>TwinKey ARAS — Live Safety Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
  <style>
    :root {
      --bg: #071019;
      --bg-2: #091521;
      --panel: rgba(12, 27, 41, .86);
      --panel-2: rgba(16, 35, 52, .82);
      --line: rgba(141, 180, 203, .14);
      --line-strong: rgba(141, 180, 203, .25);
      --text: #edf7fb;
      --soft: #a5bdc9;
      --muted: #678493;
      --cyan: #3dd8f5;
      --green: #49e6a0;
      --amber: #ffbd66;
      --red: #ff637d;
      --purple: #aa8bff;
      --mono: "JetBrains Mono", monospace;
      --sans: "DM Sans", sans-serif;
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { color-scheme: dark; scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% -10%, rgba(61,216,245,.12), transparent 32rem),
        radial-gradient(circle at 92% 20%, rgba(170,139,255,.10), transparent 29rem),
        linear-gradient(160deg, var(--bg), #050b11 72%);
      font-family: var(--sans);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: .18;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(120,170,190,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,170,190,.08) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .app {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: clamp(1rem, 2.5vw, 2rem);
    }

    .eyebrow {
      margin: 0;
      color: var(--cyan);
      font: 700 .67rem/1.2 var(--mono);
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 1.25rem;
      margin: 1.4rem 0 1.25rem;
    }

    .masthead h1 {
      max-width: 850px;
      margin: .55rem 0 0;
      font-size: clamp(2rem, 5vw, 4.4rem);
      line-height: .98;
      letter-spacing: -.055em;
    }

    .masthead h1 span { color: var(--soft); font-weight: 500; }

    .session-controls { display: flex; align-items: center; gap: .55rem; }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      border: 1px solid var(--line-strong);
      border-radius: 11px;
      padding: .65rem .85rem;
      color: var(--soft);
      background: rgba(255,255,255,.035);
      cursor: pointer;
      transition: 160ms ease;
    }

    .btn:hover { border-color: rgba(61,216,245,.5); color: #fff; transform: translateY(-1px); }
    .btn.is-active { color: #06140f; border-color: var(--green); background: var(--green); }
    .btn--danger { color: #ffd8de; border-color: rgba(255,99,125,.38); background: rgba(255,99,125,.10); }
    .btn--danger:hover { border-color: var(--red); background: rgba(255,99,125,.18); }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 5px color-mix(in srgb, currentColor 14%, transparent);
    }

    .system-strip {
      display: grid;
      grid-template-columns: minmax(230px, 1.45fr) repeat(4, minmax(120px, .7fr));
      overflow: hidden;
      margin-bottom: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8,19,29,.8);
      box-shadow: 0 18px 55px rgba(0,0,0,.22);
    }

    .system-cell {
      min-height: 84px;
      padding: 1rem 1.1rem;
      border-right: 1px solid var(--line);
    }
    .system-cell:last-child { border-right: 0; }
    .system-cell__label { color: var(--muted); font: 700 .62rem/1 var(--mono); letter-spacing: .13em; text-transform: uppercase; }
    .system-cell__value { margin-top: .55rem; color: #fff; font: 700 1.05rem/1.1 var(--mono); }
    .system-cell__sub { margin-top: .35rem; color: var(--muted); font-size: .72rem; }

    .system-state { display: flex; align-items: center; gap: .8rem; }
    .system-state__icon {
      width: 42px; height: 42px; flex: 0 0 auto; display: grid; place-items: center;
      border-radius: 50%; color: var(--green); background: rgba(73,230,160,.09); border: 1px solid rgba(73,230,160,.28);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(250px, .78fr) minmax(430px, 1.55fr) minmax(270px, .82fr);
      gap: 1rem;
      align-items: start;
    }

    .stack { display: grid; gap: 1rem; min-width: 0; }

    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(145deg, var(--panel), rgba(7,18,28,.92));
      box-shadow: 0 18px 52px rgba(0,0,0,.19), inset 0 1px rgba(255,255,255,.025);
    }

    .panel__head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: .9rem 1rem;
      border-bottom: 1px solid var(--line);
    }
    .panel__title { margin: 0; font-size: .93rem; letter-spacing: -.01em; }
    .panel__hint { color: var(--muted); font: 600 .61rem/1 var(--mono); letter-spacing: .08em; text-transform: uppercase; }
    .panel__body { padding: 1rem; }

    .scenario-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }
    .scenario {
      min-height: 72px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      gap: .55rem;
      padding: .7rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--soft);
      text-align: left;
      background: rgba(255,255,255,.025);
      cursor: pointer;
      transition: 160ms ease;
    }
    .scenario:hover { color: #fff; border-color: rgba(61,216,245,.42); background: rgba(61,216,245,.06); }
    .scenario[aria-pressed="true"] { color: #fff; border-color: rgba(61,216,245,.55); background: linear-gradient(135deg, rgba(61,216,245,.13), rgba(170,139,255,.08)); }
    .scenario__icon { font-size: 1.05rem; }
    .scenario__name { font-size: .75rem; font-weight: 700; }

    .sensor-list { display: grid; gap: 1.05rem; }
    .sensor__top { display: grid; grid-template-columns: 1fr auto; gap: .65rem; margin-bottom: .55rem; }
    .sensor label { color: var(--soft); font-size: .75rem; font-weight: 600; }
    .sensor output { color: #fff; font: 700 .72rem/1 var(--mono); }
    .sensor input[type="range"] {
      width: 100%; height: 5px; display: block; appearance: none; border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan) var(--fill, 50%), rgba(120,155,175,.18) var(--fill, 50%));
      cursor: pointer;
    }
    .sensor input::-webkit-slider-thumb {
      width: 15px; height: 15px; appearance: none; border: 3px solid #06121c; border-radius: 50%; background: #fff; box-shadow: 0 0 0 2px var(--cyan);
    }

    .stage { position: relative; min-height: 620px; }
    .stage__top {
      position: absolute; inset: 1rem 1rem auto; z-index: 2;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; pointer-events: none;
    }
    .stage-copy h2 { margin: .35rem 0 .25rem; font-size: clamp(1.25rem, 2.5vw, 2rem); letter-spacing: -.035em; }
    .stage-copy p { max-width: 460px; margin: 0; color: var(--muted); font-size: .78rem; line-height: 1.5; }

    .risk-orb {
      width: 110px; height: 110px; flex: 0 0 auto; display: grid; place-items: center; position: relative;
      border-radius: 50%; border: 1px solid var(--line-strong); background: rgba(6,15,23,.76); box-shadow: 0 0 45px rgba(73,230,160,.09);
    }
    .risk-orb::before {
      content: ""; position: absolute; inset: 6px; border-radius: inherit;
      background: conic-gradient(var(--risk-color, var(--green)) calc(var(--risk, 0) * 1%), rgba(255,255,255,.06) 0);
      mask: radial-gradient(circle, transparent 62%, #000 64%);
    }
    .risk-orb__number { font: 700 2rem/1 var(--mono); }
    .risk-orb__label { margin-top: .22rem; color: var(--muted); font: 700 .56rem/1 var(--mono); letter-spacing: .12em; text-transform: uppercase; }

    #fieldCanvas { width: 100%; height: 620px; display: block; }

    .decision-bar {
      position: absolute; inset: auto 1rem 1rem; z-index: 2; display: grid; grid-template-columns: repeat(3, 1fr); gap: .65rem;
    }
    .decision {
      min-width: 0; padding: .8rem; border: 1px solid var(--line); border-radius: 12px; background: rgba(5,14,22,.82); backdrop-filter: blur(12px);
    }
    .decision__label { color: var(--muted); font: 700 .56rem/1 var(--mono); letter-spacing: .11em; text-transform: uppercase; }
    .decision__value { overflow: hidden; margin-top: .45rem; color: var(--soft); font-size: .75rem; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
    .decision.is-alert { border-color: rgba(255,99,125,.42); background: rgba(74,18,30,.68); }
    .decision.is-alert .decision__value { color: #ffd9df; }

    .mcu-flow { display: grid; grid-template-columns: 1fr auto 1fr; align-items: stretch; gap: .55rem; }
    .mcu {
      padding: .8rem; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.025);
    }
    .mcu__id { color: var(--cyan); font: 700 .59rem/1 var(--mono); letter-spacing: .1em; }
    .mcu__name { margin: .4rem 0 .25rem; font-size: .8rem; font-weight: 700; }
    .mcu__meta { color: var(--muted); font-size: .65rem; line-height: 1.45; }
    .uart { align-self: center; color: var(--green); font: 700 .6rem/1 var(--mono); writing-mode: vertical-rl; }

    .helmet {
      min-height: 258px;
      display: grid;
      place-items: center;
      position: relative;
      border-radius: 14px;
      background: radial-gradient(circle, rgba(61,216,245,.07), transparent 62%);
    }
    .helmet__shell {
      width: 132px; height: 150px; position: relative; border: 2px solid rgba(165,189,201,.32); border-radius: 62px 62px 40px 40px;
      background: linear-gradient(145deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
    }
    .helmet__shell::after { content: "RIDER"; position: absolute; inset: 59px 0 auto; color: var(--muted); text-align: center; font: 700 .56rem var(--mono); letter-spacing: .13em; }

    .display-cluster { display: grid; gap: .85rem; }
    .oled-pair { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }
    .display-unit { min-width: 0; }
    .display-unit__label {
      display: flex; justify-content: space-between; gap: .5rem; margin-bottom: .4rem;
      color: var(--muted); font: 700 .54rem/1 var(--mono); letter-spacing: .08em; text-transform: uppercase;
    }
    .display-unit__label span:last-child { color: var(--green); }
    .oled {
      aspect-ratio: 2 / 1;
      min-height: 74px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      position: relative;
      padding: .48rem .52rem;
      border: 5px solid #111820;
      border-radius: 8px;
      color: #77e8ff;
      background: #01070b;
      box-shadow: inset 0 0 14px rgba(61,216,245,.10), 0 5px 14px rgba(0,0,0,.3);
      font-family: var(--mono);
    }
    .oled::after, .lcd-screen::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .14;
      background: repeating-linear-gradient(to bottom, transparent 0 2px, rgba(255,255,255,.08) 3px);
    }
    .oled__top { display: flex; justify-content: space-between; color: #3b8fa0; font-size: .43rem; }
    .oled__main { align-self: center; overflow: hidden; font-size: clamp(.52rem, .8vw, .7rem); font-weight: 700; line-height: 1.1; text-overflow: ellipsis; white-space: nowrap; }
    .oled__bottom { display: flex; justify-content: space-between; font-size: .46rem; }
    .oled.is-alert { color: #fff; border-color: #27333d; background: #06202a; box-shadow: inset 0 0 25px rgba(61,216,245,.25), 0 0 17px rgba(61,216,245,.14); }
    .oled.is-alert .oled__main { animation: oledBlink .65s steps(2, end) infinite; }
    @keyframes oledBlink { 50% { opacity: .38; } }

    .lcd-module {
      padding: .65rem;
      border: 1px solid rgba(73,230,160,.18);
      border-radius: 10px;
      background: linear-gradient(145deg, #183229, #10251e);
      box-shadow: inset 0 1px rgba(255,255,255,.04);
    }
    .lcd-screen {
      overflow: hidden;
      position: relative;
      padding: .55rem .6rem;
      border: 4px solid #0c1712;
      border-radius: 5px;
      color: #13341f;
      background: #8ed36a;
      box-shadow: inset 0 0 18px rgba(20,65,30,.32), 0 4px 12px rgba(0,0,0,.24);
      text-shadow: 0 0 1px rgba(10,45,20,.8);
      font: 700 clamp(.72rem, 1vw, .9rem)/1.45 var(--mono);
      letter-spacing: .055em;
    }
    .lcd__line { width: 16ch; min-height: 1.45em; white-space: pre; }
    .motor {
      --angle: 0deg; --power: 0;
      width: 18px; height: 18px; display: grid; place-items: center; position: absolute; top: 50%; left: 50%;
      border: 1px solid rgba(141,180,203,.22); border-radius: 50%; color: rgba(165,189,201,.38); background: #0b1824;
      font: 700 .5rem/1 var(--mono); transform: translate(-50%,-50%) rotate(var(--angle)) translateY(-92px) rotate(calc(var(--angle) * -1));
      box-shadow: 0 0 calc(var(--power) * 22px) color-mix(in srgb, var(--purple) calc(var(--power) * 100%), transparent);
    }
    .motor.is-on { color: #fff; border-color: var(--purple); background: color-mix(in srgb, var(--purple) calc(var(--power) * 70%), #101827); }

    .relay-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; }
    .relay { padding: .6rem .35rem; border: 1px solid var(--line); border-radius: 10px; color: var(--muted); text-align: center; background: rgba(255,255,255,.02); }
    .relay__dot { width: 7px; height: 7px; margin: 0 auto .45rem; border-radius: 50%; background: #3d5360; }
    .relay__name { font: 700 .56rem/1 var(--mono); letter-spacing: .05em; text-transform: uppercase; }
    .relay.is-on { color: #dfffee; border-color: rgba(73,230,160,.35); background: rgba(73,230,160,.06); }
    .relay.is-on .relay__dot { background: var(--green); box-shadow: 0 0 12px var(--green); }
    .relay.is-danger { border-color: rgba(255,99,125,.45); background: rgba(255,99,125,.09); }
    .relay.is-danger .relay__dot { background: var(--red); box-shadow: 0 0 12px var(--red); }

    .telemetry-canvas { width: 100%; height: 115px; display: block; }

    .event-feed { display: grid; gap: .7rem; max-height: 210px; overflow-y: auto; }
    .event { display: grid; grid-template-columns: 7px 1fr auto; gap: .65rem; align-items: start; }
    .event__dot { width: 7px; height: 7px; margin-top: .35rem; border-radius: 50%; background: var(--event, var(--cyan)); box-shadow: 0 0 10px color-mix(in srgb, var(--event, var(--cyan)) 60%, transparent); }
    .event__text { color: var(--soft); font-size: .7rem; line-height: 1.45; }
    .event__time { color: var(--muted); font: 600 .56rem/1.4 var(--mono); }

    .footer-note {
      display: flex; justify-content: space-between; gap: 1rem; margin: 1.1rem 0 .3rem; color: var(--muted); font: 600 .6rem/1.5 var(--mono); letter-spacing: .05em;
    }

    @media (max-width: 1160px) {
      .layout { grid-template-columns: minmax(240px, .75fr) minmax(450px, 1.35fr); }
      .stack--right { grid-column: 1 / -1; grid-template-columns: repeat(3, 1fr); }
      .system-strip { grid-template-columns: 1.4fr repeat(2, 1fr); }
      .system-cell:nth-child(4), .system-cell:nth-child(5) { border-top: 1px solid var(--line); }
    }

    @media (max-width: 780px) {
      .app { padding: .8rem; }
      .masthead { grid-template-columns: 1fr; align-items: start; }
      .session-controls { width: 100%; }
      .session-controls .btn { flex: 1; }
      .system-strip { grid-template-columns: 1fr 1fr; }
      .system-cell { border-bottom: 1px solid var(--line); }
      .system-cell:first-child { grid-column: 1 / -1; }
      .layout { grid-template-columns: 1fr; }
      .stack--right { grid-column: auto; grid-template-columns: 1fr; }
      .stage { min-height: 590px; }
      #fieldCanvas { height: 590px; }
      .stage__top { flex-direction: column; }
      .risk-orb { width: 88px; height: 88px; align-self: flex-end; }
      .risk-orb__number { font-size: 1.55rem; }
      .decision-bar { grid-template-columns: 1fr; }
      .footer-note { flex-direction: column; }
    }

    @media (max-width: 440px) {
      .scenario-grid { grid-template-columns: 1fr; }
      .system-strip { grid-template-columns: 1fr; }
      .system-cell:first-child { grid-column: auto; }
      .stage-copy p { display: none; }
      .decision__value { font-size: .68rem; }
      .relay-grid { grid-template-columns: 1fr 1fr; }
      .oled-pair { grid-template-columns: 1fr; }
    }

    /* ── CONFIDENCE SCORE ── */
    .confidence-bar {
      display: grid; grid-template-columns: 1fr auto; align-items: center; gap: .65rem;
      padding: .75rem 1rem; border-top: 1px solid var(--line);
      background: rgba(6,14,22,.6);
    }
    .confidence-track {
      height: 6px; border-radius: 999px; background: rgba(120,155,175,.14); overflow: hidden;
    }
    .confidence-fill {
      height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--green), var(--cyan));
      transition: width .3s ease;
    }
    .confidence-label {
      color: var(--muted); font: 700 .56rem/1 var(--mono); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .38rem;
    }
    .confidence-value {
      color: #fff; font: 700 1rem/1 var(--mono); white-space: nowrap;
    }
    .confidence-value.is-high { color: var(--green); }
    .confidence-value.is-med  { color: var(--amber); }
    .confidence-value.is-low  { color: var(--red); }

    /* ── AEB TIMER ── */
    .aeb-timer {
      display: none; align-items: center; justify-content: center; gap: .6rem;
      padding: .6rem 1rem; background: rgba(255,99,125,.12); border-top: 1px solid rgba(255,99,125,.3);
      font: 700 .7rem/1 var(--mono); color: var(--red); letter-spacing: .08em;
    }
    .aeb-timer.is-active { display: flex; animation: aebPulse .6s ease-in-out infinite alternate; }
    @keyframes aebPulse { from { background: rgba(255,99,125,.10); } to { background: rgba(255,99,125,.22); } }
    .aeb-countdown { font-size: 1.1rem; color: #fff; }

    /* ── VEHICLE SELECTOR ── */
    .vehicle-select {
      display: flex; gap: .45rem; flex-wrap: wrap; padding: 1rem;
    }
    .vtype {
      flex: 1; min-width: 60px; padding: .5rem .4rem; border: 1px solid var(--line); border-radius: 10px;
      color: var(--soft); font: 700 .62rem/1.3 var(--mono); text-align: center; cursor: pointer;
      background: rgba(255,255,255,.02); transition: 140ms ease;
    }
    .vtype:hover { border-color: rgba(61,216,245,.4); color: #fff; }
    .vtype.is-active { border-color: var(--cyan); color: var(--cyan); background: rgba(61,216,245,.09); }
    .vtype__icon { font-size: 1.1rem; display: block; margin-bottom: .3rem; }

    /* ── TEST LOG TABLE ── */
    .test-log-section { margin-top: 1.2rem; }
    .test-log-head {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      padding: .9rem 1rem; border-bottom: 1px solid var(--line);
    }
    .test-log-table {
      width: 100%; border-collapse: collapse; font: 60
